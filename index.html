    const { useState, useEffect, useRef } = React;


/* ─── hooks ─── */
const useInView = (threshold = 0.12) => {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); o.unobserve(el); } }, { threshold });
    o.observe(el); return () => o.disconnect();
  }, [threshold]);
  return [ref, v];
};
const useCountUp = (end, dur = 2000, trigger = true) => {
  const [v, setV] = useState(0);
  useEffect(() => {
    if (!trigger) return; let s = null;
    const step = (t) => { if (!s) s = t; const p = Math.min((t - s) / dur, 1); setV(Math.floor(end * (1 - Math.pow(1 - p, 4)))); if (p < 1) requestAnimationFrame(step); };
    requestAnimationFrame(step);
  }, [trigger, end, dur]);
  return v;
};
const useScrollY = () => {
  const [y, setY] = useState(0);
  useEffect(() => { const h = () => setY(window.scrollY); window.addEventListener("scroll", h, { passive: true }); return () => window.removeEventListener("scroll", h); }, []);
  return y;
};
const Reveal = ({ children, delay = 0, direction = "up", style = {} }) => {
  const [ref, vis] = useInView(0.08);
  const t = { up: "translateY(70px)", down: "translateY(-50px)", left: "translateX(70px)", right: "translateX(-70px)", none: "none" };
  return (<div ref={ref} style={{ ...style, opacity: vis ? 1 : 0, transform: vis ? "none" : t[direction], transition: `opacity 1s cubic-bezier(0.16,1,0.3,1) ${delay}s, transform 1.1s cubic-bezier(0.16,1,0.3,1) ${delay}s` }}>{children}</div>);
};

/* ─── Typewriter ─── */
const Typewriter = ({ texts, speed = 50, pause = 2200, style = {} }) => {
  const [idx, setIdx] = useState(0);
  const [displayed, setDisplayed] = useState("");
  const [deleting, setDeleting] = useState(false);
  useEffect(() => {
    const text = texts[idx];
    if (!deleting && displayed.length < text.length) {
      const t = setTimeout(() => setDisplayed(text.slice(0, displayed.length + 1)), speed);
      return () => clearTimeout(t);
    } else if (!deleting && displayed.length === text.length) {
      const t = setTimeout(() => setDeleting(true), pause);
      return () => clearTimeout(t);
    } else if (deleting && displayed.length > 0) {
      const t = setTimeout(() => setDisplayed(displayed.slice(0, -1)), speed / 2);
      return () => clearTimeout(t);
    } else if (deleting && displayed.length === 0) {
      setDeleting(false);
      setIdx((idx + 1) % texts.length);
    }
  }, [displayed, deleting, idx, texts, speed, pause]);
  return <span style={style}>{displayed}<span style={{ opacity: 0.35, animation: "blink 1s step-end infinite" }}>|</span></span>;
};

/* ─── Progress Bar (scroll) ─── */
const ScrollProgress = () => {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const h = () => {
      const total = document.documentElement.scrollHeight - window.innerHeight;
      setProgress(total > 0 ? (window.scrollY / total) * 100 : 0);
    };
    window.addEventListener("scroll", h, { passive: true });
    return () => window.removeEventListener("scroll", h);
  }, []);
  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 300, height: 3, background: "transparent", pointerEvents: "none" }}>
      <div style={{ height: "100%", width: `${progress}%`, background: C.accent, transition: "width 0.05s linear", borderRadius: "0 2px 2px 0" }} />
    </div>
  );
};

/* ─── Back to Top ─── */
const BackToTop = () => {
  const [show, setShow] = useState(false);
  useEffect(() => { const h = () => setShow(window.scrollY > 600); window.addEventListener("scroll", h, { passive: true }); return () => window.removeEventListener("scroll", h); }, []);
  return (
    <button
      onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
      style={{
        position: "fixed", bottom: 32, right: 32, zIndex: 200,
        width: 48, height: 48, borderRadius: 14, border: `1px solid ${C.border}`,
        background: "rgba(250,250,247,0.92)", backdropFilter: "blur(12px)",
        display: "grid", placeItems: "center", cursor: "pointer",
        opacity: show ? 1 : 0, transform: show ? "translateY(0)" : "translateY(20px)",
        transition: "all 0.4s ease", pointerEvents: show ? "auto" : "none",
        boxShadow: "0 4px 20px rgba(0,0,0,0.06)",
      }}
      onMouseOver={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.transform = "translateY(-2px)"; }}
      onMouseOut={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.transform = show ? "translateY(0)" : "translateY(20px)"; }}
    >
      <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 18, color: C.text, lineHeight: 1 }}>↑</span>
    </button>
  );
};
