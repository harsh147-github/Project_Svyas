// Capillary streets — fine grid, lots of them, layered like OSM zoom 15
function buildCapillaries(){
  const out = [];
  // Wanowrie/Sopan Baug grid
  for(let y=140; y<300; y+=14){
    out.push(`M ${190 + Math.random()*8} ${y} L ${640 + Math.random()*20} ${y - (300-y)*0.05}`);
  }
  for(let x=200; x<700; x+=18){
    out.push(`M ${x} ${130} L ${x + (300-130)*0.04} ${290}`);
  }
  // NIBM/Salunke dense grid
  for(let y=300; y<560; y+=12){
    out.push(`M ${380 + Math.random()*10} ${y} L ${760 + Math.random()*15} ${y + (Math.random()-0.5)*8}`);
  }
  for(let x=380; x<760; x+=14){
    out.push(`M ${x} ${300} L ${x + (Math.random()-0.5)*6} ${560}`);
  }
  // Kondhwa west diagonal
  for(let i=0; i<26; i++){
    const y0 = 240 + i*10;
    out.push(`M ${100 + Math.random()*8} ${y0} L ${380 + Math.random()*10} ${y0 + 30}`);
  }
  for(let i=0; i<22; i++){
    const x0 = 110 + i*12;
    out.push(`M ${x0} ${260} L ${x0 + 10} ${500}`);
  }
  // Undri/Pisoli sparse
  for(let y=600; y<780; y+=18){
    out.push(`M ${260 + Math.random()*10} ${y} L ${680 + Math.random()*20} ${y + (Math.random()-0.5)*10}`);
  }
  for(let x=280; x<700; x+=22){
    out.push(`M ${x} ${590} L ${x + (Math.random()-0.5)*8} ${770}`);
  }
  // Mohammadwadi East
  for(let y=320; y<520; y+=14){
    out.push(`M ${640 + Math.random()*8} ${y} L ${880 + Math.random()*15} ${y + (Math.random()-0.5)*6}`);
  }
  for(let x=640; x<880; x+=16){
    out.push(`M ${x} ${300} L ${x + (Math.random()-0.5)*6} ${520}`);
  }
  return out;
}
const CAPS = buildCapillaries();

// Building blocks — faint grey rectangles (clusters of buildings)
function buildBlocks(){
  const out = [];
  const seedRand = (s)=>()=>{ s=(s*9301+49297)%233280; return s/233280; };
  const rnd = seedRand(42);
  // Within wanowrie/sopan
  for(let i=0;i<70;i++){
    const x = 200 + rnd()*460;
    const y = 130 + rnd()*150;
    const w = 8 + rnd()*16;
    const h = 6 + rnd()*10;
    out.push({x,y,w,h});
  }
  // NIBM/salunke commercial
  for(let i=0;i<90;i++){
    const x = 390 + rnd()*360;
    const y = 300 + rnd()*250;
    const w = 8 + rnd()*18;
    const h = 6 + rnd()*12;
    out.push({x,y,w,h});
  }
  // Kondhwa dense
  for(let i=0;i<110;i++){
    const x = 100 + rnd()*290;
    const y = 250 + rnd()*240;
    const w = 6 + rnd()*12;
    const h = 5 + rnd()*9;
    out.push({x,y,w,h});
  }
  // Undri
  for(let i=0;i<70;i++){
    const x = 270 + rnd()*400;
    const y = 600 + rnd()*160;
    const w = 7 + rnd()*14;
    const h = 5 + rnd()*10;
    out.push({x,y,w,h});
  }
  // mwadi east
  for(let i=0;i<60;i++){
    const x = 640 + rnd()*230;
    const y = 310 + rnd()*200;
    const w = 7 + rnd()*14;
    const h = 5 + rnd()*10;
    out.push({x,y,w,h});
  }
  // surrounding context (lighter)
  for(let i=0;i<140;i++){
    const x = rnd()*1380;
    const y = rnd()*880;
    const w = 6 + rnd()*10;
    const h = 5 + rnd()*8;
    out.push({x,y,w,h, ctx:true});
  }
  return out;
}

function MapSurface(props){
  const { selected, setSelected, hovered, setHovered } = props || {};
  const wrap = useRef(null);
  const [view,setView] = useState({ scale:1, x:0, y:0 });
  const drag = useRef(null);

  function onWheel(e){
    e.preventDefault();
    const rect = wrap.current.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    const next = Math.max(0.6, Math.min(4, view.scale * factor));
    const k = next / view.scale;
    setView({ scale: next, x: cx - k*(cx - view.x), y: cy - k*(cy - view.y) });
  }
  function onDown(e){ drag.current = { sx:e.clientX, sy:e.clientY, vx:view.x, vy:view.y }; }
  function onMove(e){ if(!drag.current) return; setView(v=>({ ...v, x:drag.current.vx + e.clientX-drag.current.sx, y:drag.current.vy + e.clientY-drag.current.sy })); }
  function onUp(){ drag.current = null; }
  function reset(){ setView({scale:1,x:0,y:0}); }

  return (
    <div ref={wrap} onWheel={onWheel} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
         style={{position:'absolute',inset:0,overflow:'hidden',cursor:drag.current?'grabbing':'grab',background:'var(--bg)'}}>

      <svg viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid meet"
           style={{position:'absolute',inset:0,width:'100%',height:'100%',
             transform:`translate(${view.x}px, ${view.y}px) scale(${view.scale})`,
             transformOrigin:'0 0',
             transition:drag.current?'none':'transform 0.18s cubic-bezier(0.22,0.61,0.36,1)'}}>

        {/* Background paper */}
        <rect width="1400" height="900" fill="#fafaf7"/>

        {/* Greens */}
        {GREENS.map((g,i)=><path key={i} d={g.d} fill="#e6ead8" opacity="0.7"/>)}
        {/* Waters */}
        {WATERS.map((g,i)=><path key={i} d={g.d} fill="#dbe4e9" opacity="0.85"/>)}

        {/* Building blocks (context first, light) */}
        {BLOCKS.filter(b=>b.ctx).map((b,i)=>(
          <rect key={'cb'+i} x={b.x} y={b.y} width={b.w} height={b.h} fill="rgba(0,0,0,0.04)"/>
        ))}
        {BLOCKS.filter(b=>!b.ctx).map((b,i)=>(
          <rect key={'b'+i} x={b.x} y={b.y} width={b.w} height={b.h} fill="rgba(0,0,0,0.07)"/>
        ))}

        {/* Capillary streets — finest, behind */}
        {CAPS.map((d,i)=>(
          <path key={'c'+i} d={d} fill="none" stroke="rgba(0,0,0,0.18)" strokeWidth="0.5" strokeLinecap="round"/>
        ))}

        {/* Local roads */}
        {LOCALS.map((d,i)=>(
          <g key={'l'+i}>
            <path d={d} fill="none" stroke="rgba(0,0,0,0.85)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </g>
        ))}

        {/* Arterials with white centerline */}
        {ARTERIALS.map(r=>(
          <g key={r.id}>
            <path d={r.d} fill="none" stroke="#0a0a0a" strokeWidth={r.w} strokeLinecap="round" strokeLinejoin="round"/>
            <path d={r.d} fill="none" stroke="#fafaf7" strokeWidth={r.w*0.32} strokeLinecap="round" strokeLinejoin="round" strokeDasharray="6 4"/>
          </g>
        ))}

        {/* CONTEXT WARDS — drawn after roads with subtle outline */}
        {CTX.map((w,i) => (
          <polygon key={'ctx'+i} points={w.points} fill="rgba(0,0,0,0.025)" stroke="rgba(0,0,0,0.18)" strokeWidth="0.6" strokeDasharray="3 3" pointerEvents="none"/>
        ))}

        {/* CORE WARDS */}
        {WARDS.map(w => {
          const isSel = selected === w.id;
          const isHov = hovered === w.id;
          const fill = isSel
            ? 'rgba(255,153,51,0.32)'
            : isHov
              ? 'rgba(255,153,51,0.16)'
              : 'rgba(255,153,51,0.04)';
          return (
            <polygon key={w.id} points={w.points}
              fill={fill}
              stroke={isSel ? '#c8741a' : isHov ? '#e08624' : 'rgba(200,116,26,0.55)'}
              strokeWidth={isSel?2.4:isHov?1.8:1.2}
              strokeLinejoin="round"
              style={{cursor:'pointer',transition:'fill .18s, stroke .18s, stroke-width .18s'}}
              onMouseEnter={()=>setHovered(w.id)}
              onMouseLeave={()=>setHovered(null)}
              onClick={(e)=>{ e.stopPropagation(); setSelected(isSel ? null : w.id); }}
            />
          );
        })}

        {/* Big region label (faint, centered) */}
        <g style={{pointerEvents:'none'}}>
          <text x="500" y="430" textAnchor="middle" fontFamily="var(--serif)" fontSize="62" fontWeight="500" fill="rgba(0,0,0,0.06)" letterSpacing="0.04em">KONDHWA</text>
          <text x="500" y="488" textAnchor="middle" fontFamily="var(--serif)" fontSize="28" fontWeight="400" fontStyle="italic" fill="rgba(0,0,0,0.05)" letterSpacing="0.06em">NIBM · Salunke Vihar</text>
        </g>

        {/* Road labels (subtle) */}
        {ARTERIALS.map(r=>{
          const m = pathMid(r.d);
          if(!m) return null;
          return (
            <g key={'rn'+r.id} style={{pointerEvents:'none'}}>
              <text x={m.x} y={m.y-4} textAnchor="middle" fontFamily="var(--sans)" fontSize="8.5" fontStyle="italic" fill="rgba(0,0,0,0.55)">{r.name}</text>
            </g>
          );
        })}

        {/* Ward labels */}
        {WARDS.map(w => {
          const c = centroid(w.points);
          const isSel = selected===w.id;
          return (
            <g key={'lbl-'+w.id} style={{pointerEvents:'none'}}>
              <text x={c.x} y={c.y-2} textAnchor="middle" fontFamily="var(--mono)" fontSize="9" letterSpacing="2"
                    fontWeight="600"
                    fill={isSel?'#5a3306':'rgba(0,0,0,0.62)'}>{w.name}</text>
              <text x={c.x} y={c.y+12} textAnchor="middle" fontFamily="var(--sans)" fontSize="9"
                    fill={isSel?'rgba(90,51,6,0.85)':'rgba(0,0,0,0.42)'}
                    fontStyle="italic">{w.sub}</text>
              <text x={c.x} y={c.y-14} textAnchor="middle" fontFamily="var(--mono)" fontSize="8" letterSpacing="1.5"
                    fill={isSel?'#c8741a':'rgba(200,116,26,0.7)'} fontWeight="600">WARD {w.no}</text>
            </g>
          );
        })}

        {/* Context labels */}
        {CTX.map((w,i) => {
          const c = centroid(w.points);
          return (
            <text key={'cl'+i} x={c.x} y={c.y} textAnchor="middle" fontFamily="var(--sans)" fontSize="9"
                  fill="rgba(0,0,0,0.32)" fontStyle="italic" letterSpacing="0.08em" style={{pointerEvents:'none'}}>{w.name}</text>
          );
        })}

        {/* Hotspot dots */}
        {SPOTS.map((s,i)=>(
          <g key={i} style={{pointerEvents:'none'}}>
            <circle cx={s.x} cy={s.y} r="10" fill="#FF9933" opacity="0.18"/>
            <circle cx={s.x} cy={s.y} r="3.4" fill="#c8741a" stroke="#fff" strokeWidth="1"/>
          </g>
        ))}

        {/* Compass + scale */}
        <g transform="translate(1300, 80)" style={{pointerEvents:'none'}}>
          <circle r="20" fill="#ffffff" stroke="rgba(0,0,0,0.25)" strokeWidth="0.7"/>
          <path d="M0,-13 L4,5 L0,1 L-4,5 Z" fill="#0a0a0a"/>
          <text y="-24" textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill="rgba(0,0,0,0.55)">N</text>
        </g>
        <g transform="translate(1180, 850)" style={{pointerEvents:'none'}}>
          <line x1="0" y1="0" x2="100" y2="0" stroke="rgba(0,0,0,0.7)" strokeWidth="1"/>
          <line x1="0" y1="-3" x2="0" y2="3" stroke="rgba(0,0,0,0.7)" strokeWidth="1"/>
          <line x1="50" y1="-2" x2="50" y2="2" stroke="rgba(0,0,0,0.7)" strokeWidth="1"/>
          <line x1="100" y1="-3" x2="100" y2="3" stroke="rgba(0,0,0,0.7)" strokeWidth="1"/>
          <text x="50" y="14" textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill="rgba(0,0,0,0.55)">1 km</text>
        </g>
      </svg>

      <Header selected={WARDS.find(w=>w.id===selected)} hovered={WARDS.find(w=>w.id===hovered)}/>
      <ZoomControls reset={reset} zoomIn={()=>setView(v=>({...v,scale:Math.min(4,v.scale*1.18)}))} zoomOut={()=>setView(v=>({...v,scale:Math.max(0.6,v.scale*0.85)}))}/>
      <BottomBar/>
    </div>
  );
}

function centroid(pts){
  const a = pts.split(' ').map(p=>p.split(',').map(Number));
  const x = a.reduce((s,p)=>s+p[0],0)/a.length;
  const y = a.reduce((s,p)=>s+p[1],0)/a.length;
  return { x, y };
}
function pathMid(d){
  // crude — extract first two M/L coords
  const nums = d.match(/-?\d+\.?\d*/g);
  if(!nums || nums.length < 4) return null;
  const xs = [], ys = [];
  for(let i=0;i<nums.length;i+=2){ xs.push(+nums[i]); ys.push(+nums[i+1]); }
  return { x: xs[Math.floor(xs.length/2)], y: ys[Math.floor(ys.length/2)] };
}

function Header(props){
  const { selected, hovered } = props || {};
  const w = selected || hovered;
  return (
    <div style={{position:'absolute',top:0,left:0,right:0,padding:'18px 24px',display:'flex',alignItems:'flex-start',gap:18,pointerEvents:'none'}}>
      <div style={{pointerEvents:'auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:30,height:30,borderRadius:6,background:'linear-gradient(135deg,#FF9933,#c8741a)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fafaf7',fontFamily:'var(--serif)',fontStyle:'italic',fontSize:16,fontWeight:600}}>स</div>
          <div>
            <div style={{fontFamily:'var(--serif)',fontSize:18,letterSpacing:'-0.01em',color:'var(--ink)'}}>Sushaasan</div>
            <div style={{fontSize:9,color:'var(--ink-3)',fontFamily:'var(--mono)',letterSpacing:'0.18em',marginTop:1}}>CIVIC SIGNAL · PUNE</div>
          </div>
        </div>
      </div>
      <div style={{flex:1}}/>
      <div style={{width:300,pointerEvents:'auto'}}>
        {w ? (
          <div style={{background:'#ffffff',border:'1px solid rgba(0,0,0,0.1)',borderRadius:8,padding:'12px 14px',boxShadow:'0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06)',animation:'fadeIn .18s ease'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:9,fontFamily:'var(--mono)',letterSpacing:'0.16em',color:'var(--saffron-2)',fontWeight:600}}>WARD {w.no}</span>
              <span style={{width:3,height:3,borderRadius:2,background:'var(--ink-4)'}}/>
              <span style={{fontSize:9,fontFamily:'var(--mono)',letterSpacing:'0.1em',color:selected?'var(--saffron-2)':'var(--ink-3)'}}>
                {selected?'SELECTED':'HOVER'}
              </span>
            </div>
            <div style={{fontFamily:'var(--serif)',fontSize:18,marginTop:4,letterSpacing:'-0.01em',color:'var(--ink)'}}>{w.name}</div>
            <div style={{fontSize:11,color:'var(--ink-2)',marginTop:3,lineHeight:1.45,fontStyle:'italic'}}>{w.sub}</div>
          </div>
        ) : (
          <div style={{textAlign:'right',fontSize:10,color:'var(--ink-3)',fontFamily:'var(--mono)',letterSpacing:'0.12em',paddingTop:10}}>
            HOVER OR CLICK A WARD →
          </div>
        )}
      </div>
    </div>
  );
}

function ZoomControls(props){
  const { zoomIn, zoomOut, reset } = props || {};
  const btn={width:34,height:34,background:'#ffffff',border:'1px solid rgba(0,0,0,0.12)',color:'var(--ink-2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16};
  return (
    <div style={{position:'absolute',right:24,bottom:96,display:'flex',flexDirection:'column',borderRadius:8,overflow:'hidden',boxShadow:'0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06)'}}>
      <button onClick={zoomIn} style={{...btn,borderBottom:'none'}}>＋</button>
      <button onClick={zoomOut} style={{...btn,borderBottom:'none'}}>−</button>
      <button onClick={reset} style={{...btn,fontSize:10,fontFamily:'var(--mono)',letterSpacing:'0.06em'}}>FIT</button>
    </div>
  );
}

function BottomBar(){
  return (
    <div style={{position:'absolute',left:0,right:0,bottom:28,display:'flex',justifyContent:'center',pointerEvents:'none'}}>
      <button style={{pointerEvents:'auto',padding:'10px 22px',borderRadius:100,background:'#FF9933',color:'#0a0807',fontFamily:'var(--sans)',fontWeight:500,fontSize:13,letterSpacing:'0.02em',display:'flex',alignItems:'center',gap:8,boxShadow:'0 1px 2px rgba(0,0,0,0.08), 0 8px 28px rgba(255,153,51,0.35)'}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/><circle cx="12" cy="12" r="2.2" fill="currentColor"/></svg>
        Find my ward
      </button>
    </div>
  );
}

function App(){
  const [selected,setSelected] = useState(null);
  const [hovered,setHovered] = useState(null);
  return (
    <div style={{position:'fixed',inset:0}}>
      <MapSurface selected={selected} setSelected={setSelected} hovered={hovered} setHovered={setHovered}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
