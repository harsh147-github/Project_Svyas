<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUAS · Build Space</title>
  <meta name="theme-color" content="#0A0F0C" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232B6B4F'/><text x='50' y='72' text-anchor='middle' font-size='60' font-weight='bold' fill='white'>S.</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0F0C;
      --surface: #111916;
      --surface2: #16201B;
      --surface3: #1C2923;
      --border: #1E2B25;
      --border2: #283D32;
      --accent: #4ADE80;
      --accent-dim: rgba(74,222,128,0.08);
      --accent-mid: rgba(74,222,128,0.15);
      --accent-glow: rgba(74,222,128,0.04);
      --warm: #F59E0B;
      --warm-dim: rgba(245,158,11,0.1);
      --text: #E2EDE6;
      --text2: #9BAFA2;
      --text3: #5A7266;
      --text4: #3A5246;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    ::selection { background: rgba(74,222,128,0.2); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .app { display: grid; grid-template-columns: 240px 1fr 260px; grid-template-rows: 52px 1fr; height: 100vh; }

    .topbar {
      grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: rgba(10,15,12,0.85); backdrop-filter: blur(40px);
      border-bottom: 1px solid var(--border); z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 24px; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--accent); display: grid; place-items: center; font-size: 12px; font-weight: 800; color: var(--bg); }
    .logo-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .nav-tabs { display: flex; height: 100%; align-items: stretch; }
    .nav-tab { padding: 0 20px; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--text3); text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.3s; }
    .nav-tab:hover { color: var(--text2); }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .badge { font-size: 9px; font-weight: 700; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 4px; background: var(--warm-dim); color: var(--warm); }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease infinite; }

    .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text4); padding: 12px 12px 8px; }
    .agent-btn { width: 100%; padding: 10px 14px; background: transparent; border: 1px solid transparent; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
    .agent-btn:hover { background: var(--surface2); }
    .agent-btn.active { background: var(--accent-dim); border-color: rgba(74,222,128,0.12); }
    .agent-icon { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; font-size: 13px; font-weight: 700; background: var(--surface2); color: var(--text3); transition: all 0.3s; flex-shrink: 0; }
    .agent-btn.active .agent-icon { background: var(--accent); color: var(--bg); }
    .agent-info { text-align: left; }
    .agent-name { font-size: 13px; font-weight: 600; color: var(--text2); display: block; transition: color 0.2s; }
    .agent-btn.active .agent-name { color: var(--text); }
    .agent-role { font-size: 11px; color: var(--text4); display: block; margin-top: 1px; }
    .sidebar-footer { margin-top: auto; padding: 16px 12px 4px; border-top: 1px solid var(--border); }
    .sidebar-footer a { font-size: 12px; color: var(--text4); text-decoration: none; transition: color 0.2s; }
    .sidebar-footer a:hover { color: var(--accent); }

    .chat { display: flex; flex-direction: column; background: var(--bg); position: relative; overflow: hidden; }
    .chat::before { content: ''; position: absolute; top: -200px; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, var(--accent-glow), transparent 70%); pointer-events: none; z-index: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 32px 40px; position: relative; z-index: 1; }

    .welcome { display: flex; align-items: center; justify-content: center; height: 100%; padding: 40px; }
    .welcome-inner { max-width: 520px; text-align: center; }
    .welcome-glyph { width: 48px; height: 48px; border-radius: 14px; background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.1); display: grid; place-items: center; margin: 0 auto 28px; font-size: 20px; color: var(--accent); }
    .welcome h1 { font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -0.03em; line-height: 1.4; margin-bottom: 12px; }
    .welcome h1 strong { font-weight: 600; color: var(--accent); }
    .welcome p { font-size: 15px; color: var(--text3); line-height: 1.7; margin-bottom: 36px; }
    .starters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .starter { padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; text-align: left; transition: all 0.25s ease; font-family: 'Inter', sans-serif; }
    .starter:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .starter-tag { font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; display: block; }
    .starter-text { font-size: 13px; color: var(--text2); line-height: 1.5; }

    .msg { display: flex; gap: 12px; margin-bottom: 24px; animation: msgIn 0.4s cubic-bezier(0.16,1,0.3,1); max-width: 720px; }
    .msg.user { flex-direction: row-reverse; margin-left: auto; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; font-size: 11px; font-weight: 700; }
    .msg.assistant .msg-avatar { background: var(--accent-dim); color: var(--accent); }
    .msg.user .msg-avatar { background: var(--surface2); color: var(--text3); }
    .msg-content { min-width: 0; }
    .msg-meta { font-size: 11px; color: var(--text4); margin-bottom: 6px; font-weight: 500; }
    .msg-bubble { padding: 14px 18px; border-radius: 14px; font-size: 14px; line-height: 1.75; }
    .msg.assistant .msg-bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text2); }
    .msg.user .msg-bubble { background: var(--accent); color: var(--bg); font-weight: 500; }
    .msg-bubble h2 { font-size: 16px; font-weight: 600; color: var(--text); margin: 16px 0 8px; }
    .msg-bubble h2:first-child { margin-top: 0; }
    .msg-bubble h3 { font-size: 14px; font-weight: 600; color: var(--text); margin: 14px 0 6px; }
    .msg-bubble p { margin-bottom: 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble strong { color: var(--text); font-weight: 600; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin-bottom: 10px; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--accent); }
    .msg-bubble pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin: 10px 0; }
    .msg-bubble pre code { background: none; padding: 0; color: var(--text2); font-size: 12px; line-height: 1.6; }
    .msg-bubble blockquote { border-left: 2px solid var(--accent); padding-left: 14px; margin: 10px 0; color: var(--text3); font-style: italic; }

    .msg-actions { display: flex; gap: 6px; margin-top: 12px; }
    .msg-action { padding: 6px 14px; background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.1); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--accent); cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .msg-action:hover { background: var(--accent-mid); border-color: rgba(74,222,128,0.2); transform: translateY(-1px); }

    .thinking { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; animation: msgIn 0.3s ease; }
    .thinking-avatar { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-dim); display: grid; place-items: center; font-size: 11px; font-weight: 700; color: var(--accent); }
    .thinking-bar { display: flex; gap: 4px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
    .thinking-bar span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: think 1.4s ease infinite; }
    .thinking-bar span:nth-child(2) { animation-delay: 0.15s; }
    .thinking-bar span:nth-child(3) { animation-delay: 0.3s; }

    .input-area { padding: 16px 40px 24px; position: relative; z-index: 1; }
    .input-box { display: flex; align-items: flex-end; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 6px 6px 6px 20px; transition: border-color 0.3s, box-shadow 0.3s; }
    .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim), 0 8px 32px rgba(0,0,0,0.2); }
    .input-box textarea { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.6; padding: 10px 0; resize: none; min-height: 24px; max-height: 160px; }
    .input-box textarea::placeholder { color: var(--text4); }
    .send-btn { width: 38px; height: 38px; background: var(--accent); border: none; border-radius: 10px; color: var(--bg); font-size: 16px; font-weight: 700; cursor: pointer; display: grid; place-items: center; transition: all 0.2s; flex-shrink: 0; }
    .send-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 20px var(--accent-dim); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .input-hint { font-size: 11px; color: var(--text4); margin-top: 8px; padding-left: 20px; }

    .panel { background: var(--surface); border-left: 1px solid var(--border); padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .panel-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text4); }
    .wf-step { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .wf-step:hover { background: var(--surface2); }
    .wf-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid var(--text4); }
    .wf-step.done .wf-dot { background: var(--accent); border-color: var(--accent); }
    .wf-step.active .wf-dot { background: var(--warm); border-color: var(--warm); box-shadow: 0 0 8px var(--warm-dim); }
    .wf-label { color: var(--text4); }
    .wf-step.active .wf-label { color: var(--text2); font-weight: 600; }
    .wf-step.done .wf-label { color: var(--text3); }
    .ctx-card { padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; }
    .ctx-tag { font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
    .ctx-text { font-size: 12px; color: var(--text3); line-height: 1.6; }
    .ctx-empty { font-size: 12px; color: var(--text4); line-height: 1.7; text-align: center; padding: 20px 0; }

    @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes think { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const API = "/api/agent";
    const AGENTS = [
      { id: "orchestrator", name: "Guide", letter: "G", role: "General assistant" },
      { id: "ideation", name: "Ideation", letter: "I", role: "Shape ideas" },
      { id: "research", name: "Research", letter: "R", role: "Map the space" },
      { id: "builder", name: "Builder", letter: "B", role: "Write code" },
      { id: "connector", name: "Connector", letter: "C", role: "Find people" },
      { id: "launch", name: "Launch", letter: "L", role: "Ship it" },
    ];
    const STARTERS = [
      { tag: "Health", text: "Help people in rural areas get basic health checkups without traveling to the city" },
      { tag: "Education", text: "Make learning math fun for kids who hate it — something they'd actually choose to use" },
      { tag: "Environment", text: "Help reduce food waste in my neighborhood — restaurants throw away so much daily" },
      { tag: "Finance", text: "Help street vendors track daily income and expenses without needing a smartphone" },
    ];
    const md = (t) => {
      if (!t) return { __html: "" };
      if (typeof marked !== "undefined") { marked.setOptions({ breaks: true, gfm: true }); return { __html: marked.parse(t) }; }
      return { __html: t.replace(/\n/g, "<br/>") };
    };
    function App() {
      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState("");
      const [agent, setAgent] = useState("orchestrator");
      const [loading, setLoading] = useState(false);
      const [ctx, setCtx] = useState([]);
      const [wf, setWf] = useState([
        { id: "orchestrator", label: "Describe idea", status: "active" },
        { id: "ideation", label: "Shape it", status: "" },
        { id: "research", label: "Research", status: "" },
        { id: "builder", label: "Build", status: "" },
        { id: "connector", label: "Connect", status: "" },
        { id: "launch", label: "Launch", status: "" },
      ]);
      const endRef = useRef(null);
      const taRef = useRef(null);
      useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);
      const resize = (el) => { if (!el) return; el.style.height = "24px"; el.style.height = Math.min(el.scrollHeight, 160) + "px"; };
      const switchAgent = (id) => { setAgent(id); setWf(p => p.map(s => s.id === id ? { ...s, status: "active" } : s.status === "active" ? { ...s, status: "done" } : s)); };
      const send = async (text) => {
        const val = text || input.trim();
        if (!val || loading) return;
        const userMsg = { role: "user", content: val, agent };
        const all = [...msgs, userMsg];
        setMsgs(all); setInput(""); if (taRef.current) taRef.current.style.height = "24px"; setLoading(true);
        const history = all.filter(m => m.agent === agent || m.role === "user").map(m => ({ role: m.role, content: m.content }));
        const ctxStr = ctx.map(c => `[${c.tag}]: ${c.text}`).join("\n");
        try {
          const res = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: history, agent, projectContext: ctxStr }) });
          if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `Error ${res.status}`); }
          const data = await res.json();
          setMsgs(p => [...p, { role: "assistant", content: data.response, agent, agentName: data.agent }]);
          if (ctx.length === 0 && agent === "orchestrator") setCtx([{ tag: "Idea", text: val }]);
        } catch (err) {
          setMsgs(p => [...p, { role: "assistant", content: `**Error:** ${err.message}`, agent: "system", agentName: "System" }]);
        } finally { setLoading(false); }
      };
      const cur = AGENTS.find(a => a.id === agent);
      return (
        <div className="app">
          <div className="topbar">
            <div className="topbar-left">
              <a href="/" className="logo"><div className="logo-mark">S.</div><span className="logo-name">SUAS</span></a>
              <div className="nav-tabs">
                <a href="/" className="nav-tab">Home</a>
                <a href="/build.html" className="nav-tab active">Build Space <span className="badge">BETA</span></a>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div className="status"><span className="status-dot" /> Connected</div>
            </div>
          </div>
          <div className="sidebar">
            <div className="sidebar-label">Agents</div>
            {AGENTS.map(a => (
              <button key={a.id} className={`agent-btn ${agent === a.id ? "active" : ""}`} onClick={() => switchAgent(a.id)}>
                <div className="agent-icon">{a.letter}</div>
                <div className="agent-info"><span className="agent-name">{a.name}</span><span className="agent-role">{a.role}</span></div>
              </button>
            ))}
            <div className="sidebar-footer"><a href="/">← Back to home</a></div>
          </div>
          <div className="chat">
            {msgs.length === 0 ? (
              <div className="welcome"><div className="welcome-inner">
                <div className="welcome-glyph">→</div>
                <h1>What will you <strong>build?</strong></h1>
                <p>Describe any problem. Our agents will help you shape it, research it, build it, and ship it.</p>
                <div className="starters">{STARTERS.map((s, i) => (
                  <button key={i} className="starter" onClick={() => send(s.text)}>
                    <span className="starter-tag">{s.tag}</span><span className="starter-text">{s.text}</span>
                  </button>
                ))}</div>
              </div></div>
            ) : (
              <div className="messages">
                {msgs.map((m, i) => (
                  <div key={i} className={`msg ${m.role}`}>
                    <div className="msg-avatar">{m.role === "user" ? "Y" : (AGENTS.find(a => a.id === m.agent)?.letter || "!")}</div>
                    <div className="msg-content">
                      {m.role === "assistant" && <div className="msg-meta">{m.agentName || cur.name}</div>}
                      <div className="msg-bubble" dangerouslySetInnerHTML={md(m.content)} />
                      {m.role === "assistant" && i === msgs.length - 1 && agent === "orchestrator" && (
                        <div className="msg-actions">
                          <button className="msg-action" onClick={() => switchAgent("ideation")}>Shape idea</button>
                          <button className="msg-action" onClick={() => switchAgent("research")}>Research</button>
                          <button className="msg-action" onClick={() => switchAgent("builder")}>Build it</button>
                        </div>
                      )}
                    </div>
                  </div>
                ))}
                {loading && <div className="thinking"><div className="thinking-avatar">{cur.letter}</div><div className="thinking-bar"><span/><span/><span/></div></div>}
                <div ref={endRef} />
              </div>
            )}
            <div className="input-area">
              <div className="input-box">
                <textarea ref={taRef} value={input} onChange={e => { setInput(e.target.value); resize(e.target); }} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }} placeholder={`Message ${cur.name} agent...`} rows={1} disabled={loading} />
                <button className="send-btn" onClick={() => send()} disabled={!input.trim() || loading}>↑</button>
              </div>
              <div className="input-hint">Enter to send · Shift+Enter for new line</div>
            </div>
          </div>
          <div className="panel">
            <div><div className="panel-title">Workflow</div><div style={{ marginTop: 10 }}>{wf.map((s, i) => (
              <div key={i} className={`wf-step ${s.status}`} onClick={() => switchAgent(s.id)}><div className="wf-dot" /><span className="wf-label">{s.label}</span></div>
            ))}</div></div>
            <div><div className="panel-title">Context</div>{ctx.length === 0 ? <div className="ctx-empty">Start a conversation to build context</div> : ctx.map((c, i) => (
              <div key={i} className="ctx-card"><div className="ctx-tag">{c.tag}</div><div className="ctx-text">{c.text}</div></div>
            ))}</div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
